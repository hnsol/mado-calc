<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mado-calc</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="container">
        <div class="input-section">
            <select id="flavor" onchange="onFlavorChange()">
                <option value="cheese" selected>チーズ</option>
                <option value="onion">玉ねぎ</option>
                <option value="maitake">舞茸</option>
            </select>

            <div class="input-row">
                <div class="input-group">
                    <label for="cans">缶数:</label>
                    <input type="number" id="cans" placeholder="整数で入力" min="1" step="10" value="20">
                </div>

                <div class="input-group">
                    <label for="remainingDough">余り生地(g):</label>
                    <input type="number" id="remainingDough" placeholder="小数点1位まで" step="10" value="0.0">
                </div>
            </div>

            <div class="preset-buttons">
                <button type="button" onclick="setCans(10); return false;" class="preset-btn">10缶</button>
                <button type="button" onclick="setCans(20); return false;" class="preset-btn">20缶</button>
                <button type="button" onclick="setCans(30); return false;" class="preset-btn">30缶</button>
                <button type="button" onclick="setCans(40); return false;" class="preset-btn">40缶</button>
                <button type="button" onclick="setCans(50); return false;" class="preset-btn">50缶</button>
            </div>

            <div class="preset-buttons">
                <button type="button" onclick="setRemainingDough(100); return false;" class="preset-btn">100g</button>
                <button type="button" onclick="setRemainingDough(200); return false;" class="preset-btn">200g</button>
                <button type="button" onclick="setRemainingDough(300); return false;" class="preset-btn">300g</button>
                <button type="button" onclick="setRemainingDough(400); return false;" class="preset-btn">400g</button>
                <button type="button" onclick="setRemainingDough(500); return false;" class="preset-btn">500g</button>
            </div>

            <div class="button-group">
                <button onclick="calculate()">計算</button>
                <button onclick="clearInputs()" class="clear-button">クリア</button>
            </div>
        </div>

        <div id="results" class="results-section" style="display:none;">
            <div id="warningMessage" class="warning-message" style="display:none;">
                注意：余り生地が多すぎるようです
            </div>

            <div class="result-group compact">
                <p><span id="resultFlavor"></span> / <span id="resultCans"></span>缶 / <span id="resultTotalPieces"></span>枚</p>
                <p>余り: <span id="resultRemainingGrams"></span>g (<span id="resultRemainingPieces"></span>枚) → 追加: <span id="resultAdditionalPieces"></span>枚</p>
            </div>

            <div class="result-group">
                <h3>必要グラム数</h3>
                <div id="materialsDetail"></div>
                <div id="totalMaterials" class="materials-total"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
