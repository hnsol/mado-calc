<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪟 mado-calc ⚖️</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🪟 mado-calc ⚖️</h1>

        <div class="input-section">
            <div class="input-group">
                <label for="flavor">フレーバー:</label>
                <select id="flavor">
                    <option value="cheese" selected>チーズ</option>
                    <option value="onion">玉ねぎ</option>
                </select>
            </div>

            <div class="input-group">
                <label for="cans">缶数:</label>
                <input type="number" id="cans" placeholder="整数で入力" min="1" step="10" value="20">
            </div>

            <div class="input-group">
                <label for="remainingDough">余り生地(g):</label>
                <input type="number" id="remainingDough" placeholder="小数点1位まで" step="10" value="0.0">
            </div>

            <div class="button-group">
                <button onclick="calculate()">計算</button>
                <button onclick="clearInputs()" class="clear-button">クリア</button>
            </div>
        </div>

        <div id="results" class="results-section" style="display:none;">
            <div class="result-group compact">
                <p><span id="resultFlavor"></span> / <span id="resultCans"></span>缶 / 枚数: <span id="resultTotalPieces"></span>枚</p>
            </div>

            <div class="result-group compact">
                <p>余り: <span id="resultRemainingGrams"></span>g (<span id="resultRemainingPieces"></span>枚) → 追加: <span id="resultAdditionalPieces"></span>枚 (<span id="resultAdditionalGrams"></span>g)</p>
            </div>

            <div class="result-group">
                <h3>必要グラム数</h3>
                <div id="materialsDetail"></div>
                <div id="totalMaterials" class="materials-total"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
