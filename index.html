<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mado-calc</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="container">
        <div id="results" class="results-section" style="display:none;">
            <div id="warningMessage" class="warning-message" style="display:none;">
                注意：余り生地が多すぎるようです
            </div>

            <div class="result-group compact">
                <p><span id="resultFlavor"></span> / <span id="resultCans"></span>缶 / <span id="resultTotalPieces"></span>枚</p>
                <p>余り: <span id="resultRemainingGrams"></span>g (<span id="resultRemainingPieces"></span>枚) → 追加: <span id="resultAdditionalPieces"></span>枚</p>
            </div>

            <div class="result-group">
                <h3>必要グラム数<span id="materialsLabel"></span></h3>
                <div id="materialsDetail"></div>
                <div id="totalMaterials" class="materials-total"></div>
            </div>
        </div>

        <div class="input-section">
            <div class="toolbar">
                <label class="sr-only" for="flavor">フレーバー</label>
                <select id="flavor" onchange="onFlavorChange()">
                    <option value="cheese" selected>チーズ</option>
                    <option value="onion">玉ねぎ</option>
                    <option value="maitake">舞茸</option>
                    <option value="sansho">山椒</option>
                    <option value="miso">味噌</option>
                </select>
                <button onclick="clearInputs()" class="clear-button toolbar-button">C</button>
                <button onclick="calculate()" class="toolbar-button">＝</button>
            </div>

            <div class="input-panel">
                <div class="field-block">
                    <div class="field-row">
                        <label for="cans">数量</label>
                        <div class="input-shell">
                            <input type="number" id="cans" min="1" value="20">
                            <span class="unit">缶</span>
                        </div>
                    </div>
                    <div class="preset-buttons cans-presets">
                        <button type="button" onclick="setCans(10); return false;" class="preset-btn" data-target="cans" data-value="10">10缶</button>
                        <button type="button" onclick="setCans(20); return false;" class="preset-btn" data-target="cans" data-value="20">20缶</button>
                        <button type="button" onclick="setCans(30); return false;" class="preset-btn" data-target="cans" data-value="30">30缶</button>
                        <button type="button" onclick="setCans(40); return false;" class="preset-btn" data-target="cans" data-value="40">40缶</button>
                        <button type="button" onclick="setCans(50); return false;" class="preset-btn" data-target="cans" data-value="50">50缶</button>
                    </div>
                </div>

                <div class="field-block">
                    <div class="field-row">
                        <label for="remainingDough">余り</label>
                        <div class="input-shell">
                            <input type="number" id="remainingDough" value="0.0">
                            <span class="unit">g</span>
                        </div>
                    </div>
                    <div class="preset-buttons dough-presets">
                        <button type="button" onclick="setRemainingDough(100); return false;" class="preset-btn" data-target="remainingDough" data-value="100.0">100g</button>
                        <button type="button" onclick="setRemainingDough(200); return false;" class="preset-btn" data-target="remainingDough" data-value="200.0">200g</button>
                        <button type="button" onclick="setRemainingDough(300); return false;" class="preset-btn" data-target="remainingDough" data-value="300.0">300g</button>
                        <button type="button" onclick="setRemainingDough(400); return false;" class="preset-btn" data-target="remainingDough" data-value="400.0">400g</button>
                        <button type="button" onclick="setRemainingDough(500); return false;" class="preset-btn" data-target="remainingDough" data-value="500.0">500g</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
